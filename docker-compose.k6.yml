# Minimal stack for k6 tournament smoke (CI and local).
# Usage: docker compose -f docker-compose.k6.yml up -d --build
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: truholdem_k6
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d truholdem_k6"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/truholdem_k6
      SPRING_DATASOURCE_USERNAME: test
      SPRING_DATASOURCE_PASSWORD: test
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_JWT_SECRET: k6SmokeTestSecret_AtLeast32Chars_LongEnough_ForHS256
      CORS_ORIGINS: http://localhost:8080
      SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
      SPRING_LIQUIBASE_ENABLED: "false"
      RATE_LIMIT_ENABLED: "false"
      # Dev/CI only: seed an ADMIN so the k6 smoke can create + start tournaments (both are admin-gated).
      APP_SEED_ADMIN_ENABLED: "true"
      APP_SEED_ADMIN_USERNAME: "k6admin"
      APP_SEED_ADMIN_PASSWORD: "K6AdminPass123!"
      APP_SEED_ADMIN_EMAIL: "k6admin@k6.local"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 90s

# Production Configuration
# NOTE: do NOT set `spring.profiles.active` here. It is illegal in a profile-specific resource
# (Spring Boot 2.4+ throws InvalidConfigDataPropertyException at startup) — activate this profile
# externally via SPRING_PROFILES_ACTIVE=prod.

# Logging Configuration for Production
logging.level.com.truholdem=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.root=INFO

# Security enhancements
server.error.include-stacktrace=never
server.error.include-message=on_param

# JWT secret MUST be supplied externally in production. No fallback default is
# provided here on purpose: if JWT_SECRET is unset the placeholder cannot be
# resolved and the application fails fast at startup instead of booting with the
# insecure development default from application.properties.
app.jwt.secret=${JWT_SECRET}

# Database optimizations
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false

# Cache configuration for production
spring.cache.redis.time-to-live=3600000

# Actuator security for production
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=never

# Pyramid 10k production profile (use with SPRING_PROFILES_ACTIVE=docker,pyramid-prod)

spring.cache.type=redis
spring.data.redis.lettuce.pool.max-active=32
spring.data.redis.lettuce.pool.max-idle=16
spring.data.redis.lettuce.pool.min-idle=4

spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

app.websocket.cluster.enabled=${WEBSOCKET_CLUSTER_ENABLED:true}

app.game.bot-mode=advanced
app.game.hot-state-enabled=true
app.game.persist-on-hand-end-only=true
app.game.buffer-statistics-on-actions=true
app.game.async-persist-enabled=true

app.tournament.max-players-limit=10000
app.tournament.async-start-threshold=500
app.tournament.start-batch-size=200
app.tournament.shard-count=16
app.tournament.table-topics-enabled=true
app.tournament.pyramid-default-seats-per-table=10
app.tournament.pyramid-default-hands-per-round=5
app.tournament.pyramid-table-parallelism=32

app.tournament.detail-max-registrations=100
app.tournament.detail-max-tables=50

logging.level.com.truholdem.service.PokerGameService=WARN
logging.level.com.truholdem.service.AdvancedBotAIService=WARN
logging.level.com.truholdem.service.tournament.PyramidTournamentService=INFO

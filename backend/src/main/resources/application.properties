# Application Configuration
spring.application.name=truholdem
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Server Configuration
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/truholdem
spring.datasource.username=${DB_USERNAME:user}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.pool-name=TruHoldemHikariCP

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Liquibase Configuration
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.enabled=true

# Redis Configuration (for caching and sessions)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2000ms
spring.data.redis.database=0

# Cache Configuration
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false

# Security Configuration
app.jwt.secret=${JWT_SECRET:truholdemSecretKeyThatShouldBeVeryLongAndSecure}
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# Logging Configuration
logging.level.com.truholdem=INFO
logging.level.com.truholdem.service.UserService=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/truholdem.log

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus,env,loggers
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.health.diskspace.enabled=true
management.health.db.enabled=true
management.health.redis.enabled=true
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}
management.info.env.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true

# Custom info properties
info.app.name=${spring.application.name}
info.app.version=2.0.0
info.app.description=Texas Hold'em Poker Simulator
info.app.java-version=${java.version}

# WebSocket Configuration
app.websocket.allowed-origins=${WEBSOCKET_ORIGINS:http://localhost:4200,https://truholdem.porkolab.hu}

# API Documentation
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.doc-expansion=none

# API Version Configuration
app.version=${info.app.version:2.0.0}
app.base-url=${APP_BASE_URL:http://localhost:8080}

# CORS Configuration
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200,https://truholdem.porkolab.hu}
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true

# Game Configuration
app.game.default-chips=1000
app.game.default-small-blind=10
app.game.default-big-blind=20
app.game.max-players=6
app.game.min-players=2
app.game.bot-think-time=2000

app.jwt.refreshExpiration=7200

app.cors.allowedOrigins=*
app.cors.allowedMethods=GET,POST,PUT,DELETE
app.cors.allowedHeaders=*

app.websocket.allowedOrigins=*

app.game.defaultChips=1000
app.game.defaultSmallBlind=10
app.game.defaultBigBlind=20
app.game.maxPlayers=8
app.game.minPlayers=2
app.game.botThinkTime=100
app.game.turn-action-timeout-seconds=30
app.game.hand-result-delay-seconds=3

# Game hot state (Phase 2 — Redis authority during hand, PG on milestones)
app.game.hot-state-enabled=true
app.game.persist-on-hand-end-only=true
app.game.buffer-statistics-on-actions=true
app.game.bot-monte-carlo-iterations=500
# advanced (default) | passive — check/call only, for mass bot load tests
app.game.bot-mode=advanced
app.game.engine=legacy
app.game.async-persist-enabled=true

# Single-writer per table + commandId idempotency (engine migration Phase 2).
# Default off keeps the legacy lock-free path; flip on once the concurrency load test is green.
app.game.single-writer-enabled=false
app.game.single-writer-pool-size=0
app.game.single-writer-queue-capacity=10000
app.game.single-writer-await-millis=10000
app.game.command-dedup-ttl-millis=60000
app.game.command-dedup-max-per-game=256

# Append-only domain-event log in Postgres (engine migration Phase 4; audit + replay-from-events).
# Fills only on the aggregate engine path; flip off to disable the audit writer.
app.game.event-log-enabled=true

# Tournament scale (Phase 1 — large-field MTT)
app.tournament.max-players-limit=10000
app.tournament.async-start-threshold=500
app.tournament.start-batch-size=200
app.tournament.default-page-size=50
app.tournament.shard-count=16
app.tournament.table-topics-enabled=true
app.tournament.pyramid-default-seats-per-table=10
app.tournament.pyramid-default-hands-per-round=3

# ==================== OpenTelemetry Configuration ====================
# Enable/disable OpenTelemetry
otel.enabled=${OTEL_ENABLED:true}

# Service identification
otel.service.name=${OTEL_SERVICE_NAME:truholdem-backend}
otel.service.version=1.0.0

# OTLP Exporter configuration
otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
otel.exporter.otlp.timeout=10000

# Metrics export interval (ms)
otel.metrics.export.interval=${OTEL_METRICS_EXPORT_INTERVAL:60000}

# Tracing configuration
otel.traces.sampler=always_on
otel.propagators=tracecontext,baggage

# Logging correlation - adds trace IDs to logs
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# ============================================================
# Email/SMTP Configuration
# ============================================================
# Set these environment variables to enable email sending
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Email settings
app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:noreply@truholdem.com}
app.mail.from-name=${MAIL_FROM_NAME:TruHoldem}
app.mail.verification-url=${APP_BASE_URL:http://localhost:4200}/auth/verify-email

# ============================================================
# WebSocket Cluster Configuration for Horizontal Scaling
# ============================================================
# Enable clustering for multiple backend instances
app.websocket.cluster.enabled=${WEBSOCKET_CLUSTER_ENABLED:false}
# Unique instance ID (auto-generated from hostname or UUID if not set)
app.websocket.cluster.instance-id=${HOSTNAME:${random.uuid}}

# Per-table ownership (engine migration Phase 5). When on, only the owning node schedules a table's
# timers/blind levels (Redis lease keyed by gameId/tournamentId). Default off = single-node behavior.
app.cluster.ownership-enabled=${CLUSTER_OWNERSHIP_ENABLED:false}
app.cluster.lease-ttl-millis=30000
# Cross-node command routing (Phase 5): forward actions to the owning node over HTTP. Requires
# ownership-enabled. node-base-url must be this node's peer-reachable URL; shared-secret guards the
# internal node-to-node endpoint.
app.cluster.routing-enabled=${CLUSTER_ROUTING_ENABLED:false}
app.cluster.node-base-url=${CLUSTER_NODE_BASE_URL:}
app.cluster.shared-secret=${CLUSTER_SHARED_SECRET:}
# Crypto wallet (on-chain deposits + KYC-gated withdrawals). Default OFF; requires a configured provider.
app.payments.enabled=${PAYMENTS_ENABLED:false}
app.payments.kyc-required-for-withdrawal=${PAYMENTS_KYC_REQUIRED:true}
# When on, a withdrawal is debited and parked in PENDING_APPROVAL until a moderator approves/rejects it.
app.payments.withdrawal-approval-required=${PAYMENTS_WITHDRAWAL_APPROVAL_REQUIRED:false}
# Withdrawal risk limits (per CryptoAsset name) + cooling period. Examples (uncomment + tune per deployment):
#   app.payments.max-withdrawal-per-tx.USDT_TRC20=2000
#   app.payments.max-withdrawal-per-day.USDT_TRC20=5000
#   app.payments.max-withdrawal-per-tx.BTC=0.5
# Mandatory delay (minutes) between a withdrawal request and when it may be approved (0 = off).
app.payments.withdrawal-cooling-period-minutes=${PAYMENTS_WITHDRAWAL_COOLING_MINUTES:0}
app.payments.webhook-secret=${PAYMENTS_WEBHOOK_SECRET:}
# Provider: mock (default, no network — dev/tests) or gateway (real HTTP gateway). For testnet, point
# gateway-base-url at the provider's sandbox/testnet endpoint and set network=testnet.
app.payments.provider=${PAYMENTS_PROVIDER:mock}
app.payments.network=${PAYMENTS_NETWORK:testnet}
app.payments.gateway-base-url=${PAYMENTS_GATEWAY_BASE_URL:}
app.payments.gateway-api-key=${PAYMENTS_GATEWAY_API_KEY:}
# Self-custody ETH provider (provider=eth-self-custody): master key for deterministic address derivation.
# DEMO — in production keep this in an HSM and derive watch-only from a BIP-32 xpub.
app.payments.self-custody-master-key=${PAYMENTS_SELF_CUSTODY_MASTER_KEY:}
# Watch-only deposit ingestion: credit a detected deposit only after this many on-chain confirmations.
app.payments.min-confirmations=${PAYMENTS_MIN_CONFIRMATIONS:1}
# KYC verification uploads (video of the user with their passport). Bytes go to this directory (metadata in
# the DB); in a cluster this MUST be a shared volume. Empty disables uploads. Max upload size in bytes.
app.payments.kyc-storage-type=${PAYMENTS_KYC_STORAGE_TYPE:filesystem}
app.payments.kyc-storage-dir=${PAYMENTS_KYC_STORAGE_DIR:}
app.payments.kyc-max-upload-bytes=${PAYMENTS_KYC_MAX_UPLOAD_BYTES:52428800}
# S3/MinIO object-storage backend (when kyc-storage-type=s3). Cluster-friendly; no shared volume needed.
app.payments.s3-endpoint=${PAYMENTS_S3_ENDPOINT:}
app.payments.s3-bucket=${PAYMENTS_S3_BUCKET:}
app.payments.s3-region=${PAYMENTS_S3_REGION:us-east-1}
app.payments.s3-access-key=${PAYMENTS_S3_ACCESS_KEY:}
app.payments.s3-secret-key=${PAYMENTS_S3_SECRET_KEY:}
# Encrypt KYC videos at rest with AES-GCM. Base64 AES key (16/24/32 bytes); empty = store plaintext.
app.payments.kyc-encryption-key=${PAYMENTS_KYC_ENCRYPTION_KEY:}
# GDPR retention: auto-delete KYC media older than N days (0 = never); how often the sweep runs.
app.payments.kyc-retention-days=${PAYMENTS_KYC_RETENTION_DAYS:30}
app.payments.kyc-retention-scan-interval-ms=${PAYMENTS_KYC_RETENTION_SCAN_INTERVAL_MS:86400000}
# Allow KYC video uploads up to ~50 MB (slightly above the app-level cap so the friendlier check triggers).
spring.servlet.multipart.max-file-size=55MB
spring.servlet.multipart.max-request-size=60MB

# Failover takeover (Phase 5): periodically take over active tables whose owner died and resume their
# stalled turn timer. Requires ownership-enabled.
app.cluster.takeover-enabled=${CLUSTER_TAKEOVER_ENABLED:false}
# Split-brain safety: when true, a node that cannot reach Redis refuses ownership (fail-closed) instead of
# assuming it owns its tables (default fail-open). Trades availability for safety in a real cluster.
app.cluster.fail-closed=${CLUSTER_FAIL_CLOSED:false}
# Fencing tokens: when true (requires ownership + hot-state), the Redis hot-state write rejects a write
# from a stale former owner whose lease was taken over (guards the GC-pause / lease-handoff window).
app.cluster.fencing-enabled=${CLUSTER_FENCING_ENABLED:false}

# ============================================================
# OAuth2 Configuration (Google & GitHub)
# ============================================================
# OAuth2 is OPTIONAL - only enabled if GOOGLE_CLIENT_ID or GITHUB_CLIENT_ID env vars are set
# See example.env for setup instructions

# OAuth2 redirect URI for frontend callback
app.oauth2.redirect-uri=${OAUTH2_REDIRECT_URI:http://localhost:4200/auth/oauth-callback}

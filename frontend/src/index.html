  <!-- sockjs-client (loaded by the WebSocket service) references the Node `global`; map it to `window`
       so its module initializes in the browser. Must run before the app bundle. -->
  <script>
    if (typeof window !== 'undefined' && typeof window.global === 'undefined') {
      window.global = window;
    }
  </script>

</body>

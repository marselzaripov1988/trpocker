worker_processes auto;
# Headroom for a large WebSocket fleet (the ws-cluster capacity scenario opens 1000s of long-lived
# connections through this LB); raise the per-worker connection + fd caps well above the default.
worker_rlimit_nofile 65535;

events {
    worker_connections 32768;
}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Round-robin (NOT ip_hash) so a single load generator's traffic spreads across both nodes — that is
    # what exercises horizontal scaling. (The production cluster uses ip_hash in docker/nginx/cluster.conf
    # to keep a real client's WebSocket sticky; for an HTTP throughput test round-robin is what we want.)
    upstream truholdem_scale {
        server backend1:8080;
        server backend2:8080;
    }

    server {
        listen 80;

        location /api/internal/ {
            return 403;
        }

        location / {
            proxy_pass http://truholdem_scale;
            proxy_http_version 1.1;
            proxy_set_header Host       $host;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            # Long timeouts so held-open WebSockets aren't reaped mid-scenario.
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}

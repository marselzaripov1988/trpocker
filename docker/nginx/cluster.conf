worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # WebSocket (SockJS/STOMP) upgrade handling.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Two TruHoldem nodes behind the load balancer.
    # ip_hash pins each client to one node, so a client's long-lived WebSocket and its REST calls land on
    # the same node. Cross-node command routing still guarantees correctness if a client's actions reach a
    # node that does not own the table — stickiness just minimises the number of HTTP forwards.
    upstream truholdem_cluster {
        ip_hash;
        server backend1:8080;
        server backend2:8080;
    }

    server {
        listen 80;

        # Node-to-node internal endpoints are authenticated by the shared cluster secret and called
        # backend->backend on the internal network; they must never be reachable from clients via the LB.
        location /api/internal/ {
            return 403;
        }

        location / {
            proxy_pass http://truholdem_cluster;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket upgrade
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Long-lived WebSocket connections
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}

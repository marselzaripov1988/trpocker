


groups:
  - name: truholdem-critical
    rules:
      
      
      
      
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) 
            / 
            sum(rate(http_server_requests_seconds_count[5m]))
          ) * 100 > 5
        for: 2m
        labels:
          severity: critical
          service: truholdem
        annotations:
          summary: "High HTTP 5xx error rate detected"
          description: "Error rate is {{ $value | printf \"%.2f\" }}% (threshold: 5%). This indicates server-side failures that need immediate attention."
          runbook_url: "https://runbooks.truholdem.com/high-error-rate"
          
      - alert: VeryHighErrorRate
        expr: |
          (
            sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) 
            / 
            sum(rate(http_server_requests_seconds_count[5m]))
          ) * 100 > 10
        for: 1m
        labels:
          severity: page
          service: truholdem
        annotations:
          summary: "CRITICAL: Very high HTTP error rate"
          description: "Error rate is {{ $value | printf \"%.2f\" }}% (threshold: 10%). Immediate investigation required!"
          
      - alert: SlowResponseTime
        expr: |
          histogram_quantile(0.99, 
            sum(rate(http_server_requests_seconds_bucket[5m])) by (le)
          ) > 2
        for: 5m
        labels:
          severity: warning
          service: truholdem
        annotations:
          summary: "Slow HTTP response time (P99)"
          description: "P99 response time is {{ $value | printf \"%.2f\" }}s (threshold: 2s). Check for database issues or resource constraints."
          
      - alert: VerySlowResponseTime
        expr: |
          histogram_quantile(0.99, 
            sum(rate(http_server_requests_seconds_bucket[5m])) by (le)
          ) > 5
        for: 2m
        labels:
          severity: critical
          service: truholdem
        annotations:
          summary: "CRITICAL: Very slow HTTP response time"
          description: "P99 response time is {{ $value | printf \"%.2f\" }}s (threshold: 5s). Application may be effectively down."

      
      
      
      
      - alert: HighMemoryUsage
        expr: |
          (jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"}) * 100 > 80
        for: 5m
        labels:
          severity: warning
          service: truholdem
        annotations:
          summary: "High JVM heap memory usage"
          description: "Heap usage is {{ $value | printf \"%.1f\" }}% (threshold: 80%). Consider increasing heap size or investigating memory leaks."
          
      - alert: CriticalMemoryUsage
        expr: |
          (jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"}) * 100 > 90
        for: 2m
        labels:
          severity: critical
          service: truholdem
        annotations:
          summary: "CRITICAL: JVM heap memory near exhaustion"
          description: "Heap usage is {{ $value | printf \"%.1f\" }}% (threshold: 90%). OOMKill imminent! Immediate action required."
          
      - alert: HighGCPauseTime
        expr: |
          rate(jvm_gc_pause_seconds_sum[5m]) > 0.5
        for: 5m
        labels:
          severity: warning
          service: truholdem
        annotations:
          summary: "High GC pause time"
          description: "GC is consuming {{ $value | printf \"%.2f\" }}s per second. This may cause application latency."

      
      
      
      
      - alert: DatabaseConnectionPoolExhausted
        expr: hikaricp_connections_pending > 5
        for: 2m
        labels:
          severity: critical
          service: truholdem
        annotations:
          summary: "Database connection pool is exhausted"
          description: "{{ $value }} threads waiting for database connections. Queries will fail or timeout."
          
      - alert: DatabaseConnectionPoolLow
        expr: |
          (hikaricp_connections_idle / hikaricp_connections_max) * 100 < 10
        for: 5m
        labels:
          severity: warning
          service: truholdem
        annotations:
          summary: "Database connection pool running low"
          description: "Only {{ $value | printf \"%.1f\" }}% idle connections remaining. Pool may become exhausted under load."
          
      - alert: DatabaseConnectionTimeout
        expr: |
          rate(hikaricp_connections_timeout_total[5m]) > 0.1
        for: 2m
        labels:
          severity: critical
          service: truholdem
        annotations:
          summary: "Database connection timeouts occurring"
          description: "{{ $value | printf \"%.2f\" }} connection timeouts per second. Database may be overloaded or unreachable."

      
      
      
      
      - alert: LowCacheHitRate
        expr: |
          (
            sum(rate(cache_gets_total{result="hit"}[5m])) 
            / 
            sum(rate(cache_gets_total[5m]))
          ) * 100 < 70
        for: 10m
        labels:
          severity: warning
          service: truholdem
        annotations:
          summary: "Low cache hit rate"
          description: "Cache hit rate is {{ $value | printf \"%.1f\" }}% (threshold: 70%). This increases database load."
          
      # Fires if the redis_exporter cannot reach Redis (redis_up==0) OR the exporter itself is unscrapeable
      # (up==0, i.e. we have lost Redis visibility entirely). Previously scraped 6379 (the RESP port, not an
      # HTTP metrics endpoint), so up{job="redis"} was always 0 and this alert was meaningless.
      - alert: CacheDown
        expr: |
          redis_up == 0 or up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
          service: truholdem
        annotations:
          summary: "Redis cache is down"
          description: "Redis is not responding (redis_up=0) or its exporter is unreachable. Hot-state, cluster ownership/fencing and caching are all degraded."
          runbook_url: "https://runbooks.truholdem.com/cache-down"

      
      
      
      
      - alert: SlowBotDecisions
        expr: |
          histogram_quantile(0.95, 
            rate(truholdem_bot_decision_time_bucket[5m])
          ) > 1000
        for: 5m
        labels:
          severity: warning
          service: truholdem
        annotations:
          summary: "Bot decision time is slow"
          description: "P95 bot decision time is {{ $value | printf \"%.0f\" }}ms (threshold: 1000ms). Game experience may be affected."
          
      - alert: HighGameCreationTime
        expr: |
          histogram_quantile(0.95, 
            rate(truholdem_game_creation_time_bucket[5m])
          ) > 5000
        for: 5m
        labels:
          severity: warning
          service: truholdem
        annotations:
          summary: "Game creation is slow"
          description: "P95 game creation time is {{ $value | printf \"%.0f\" }}ms (threshold: 5000ms). Users may experience delays."
          
      - alert: NoActiveGames
        expr: |
          truholdem_games_active == 0 and truholdem_players_active > 0
        for: 10m
        labels:
          severity: warning
          service: truholdem
        annotations:
          summary: "Active players but no games"
          description: "There are active players but no games running. Possible game creation issue."

      
      
      
      
      - alert: ServiceDown
        expr: up{job="truholdem-backend"} == 0
        for: 1m
        labels:
          severity: page
          service: truholdem
        annotations:
          summary: "TruHoldem backend is DOWN"
          description: "The backend service is not responding to health checks. Immediate investigation required!"
          
      - alert: HighCPUUsage
        expr: process_cpu_usage * 100 > 80
        for: 5m
        labels:
          severity: warning
          service: truholdem
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value | printf \"%.1f\" }}% (threshold: 80%). Consider scaling or optimization."
          
      - alert: TooManyOpenFiles
        expr: |
          process_files_open_files / process_files_max_files * 100 > 80
        for: 5m
        labels:
          severity: warning
          service: truholdem
        annotations:
          summary: "High file descriptor usage"
          description: "{{ $value | printf \"%.1f\" }}% of file descriptors used. May cause connection failures."
          
      - alert: HighThreadCount
        expr: jvm_threads_live_threads > 300
        for: 5m
        labels:
          severity: warning
          service: truholdem
        annotations:
          summary: "High JVM thread count"
          description: "{{ $value }} live threads (threshold: 300). Possible thread leak or excessive concurrency."

  - name: truholdem-availability
    rules:
      
      
      
      
      - alert: AvailabilityBelowSLA
        expr: |
          (
            1 - (
              sum(rate(http_server_requests_seconds_count{status=~"5.."}[1h])) 
              / 
              sum(rate(http_server_requests_seconds_count[1h]))
            )
          ) * 100 < 99.5
        for: 5m
        labels:
          severity: critical
          service: truholdem
        annotations:
          summary: "Service availability below SLA"
          description: "Availability is {{ $value | printf \"%.2f\" }}% (SLA: 99.5%). Investigate immediately."
          
      - alert: HighRequestLatency
        expr: |
          histogram_quantile(0.50, 
            sum(rate(http_server_requests_seconds_bucket[5m])) by (le)
          ) > 0.5
        for: 5m
        labels:
          severity: warning
          service: truholdem
        annotations:
          summary: "Elevated median response latency"
          description: "P50 latency is {{ $value | printf \"%.2f\" }}s (threshold: 500ms). User experience is degraded."

  # Redis hot-state (Phase 2 live state + Phase 5 cluster failover/routing/fencing all read shared hot-state).
  # Two rules cover the two ways hot-state can fail: silently not wired, or failing writes at runtime. Both are
  # app-level signals — the previous indirect signal (a Redis write throwing a 5xx) no longer fires now that the
  # coordinator degrades gracefully to PostgreSQL.
  - name: truholdem-hotstate
    rules:

      # The exact regression that silently disabled hot-state in production: the feature switch is on, but the
      # store never wired (e.g. a @ConditionalOnBean ordering trap), so Redis is bypassed and games degrade to
      # PostgreSQL-only with no other signal. Never false-fires when hot-state is intentionally off (enabled=0).
      - alert: HotStateDisabledButEnabled
        expr: |
          truholdem_hotstate_enabled == 1 and truholdem_hotstate_active == 0
        for: 1m
        labels:
          severity: critical
          service: truholdem
        annotations:
          summary: "Redis hot-state is enabled but not active (silently bypassed)"
          description: "app.game.hot-state-enabled is set but the hot-state store is not wired — Redis is bypassed and games run PostgreSQL-only. Cluster failover/routing/fencing rely on shared hot-state. Check the RedisGameStateStore / GameStateRedisConfig bean wiring."
          runbook_url: "https://runbooks.truholdem.com/hot-state-disabled"

      # Runtime infrastructure failures: hot-state writes are throwing (Redis unreachable / timing out) and the
      # coordinator is falling back to PostgreSQL. Player actions survive, but cross-node hot-state sharing breaks.
      - alert: HotStateWriteFailures
        expr: |
          rate(truholdem_hotstate_write_failures_total[5m]) > 0
        for: 2m
        labels:
          severity: critical
          service: truholdem
        annotations:
          summary: "Redis hot-state writes are failing"
          description: "Game hot-state is degrading to PostgreSQL-only ({{ $value | printf \"%.2f\" }} failures/s). Player actions are preserved via the Postgres fallback, but cross-node hot-state sharing is broken — check Redis connectivity and latency."
          runbook_url: "https://runbooks.truholdem.com/hot-state-write-failures"

  # Live-table integrity: the per-table single-writer (serializes commands for one table) and the cross-node
  # WebSocket event bridge. Failures here freeze tables or stop clients seeing updates — without surfacing as 5xx.
  - name: truholdem-realtime
    rules:

      # Commands timing out in the single-writer queue means a table's processing chain is stalled — the hand
      # freezes for every seat at that table.
      - alert: TableCommandTimeouts
        expr: |
          rate(poker_table_command_timeouts_total[5m]) > 0
        for: 2m
        labels:
          severity: critical
          service: truholdem
        annotations:
          summary: "Single-writer command timeouts — a table may be frozen"
          description: "{{ $value | printf \"%.2f\" }} table commands/s are timing out in the single-writer queue. A table's processing chain is stalled — the hand is frozen for every seat. Check for a blocked persist / DB latency / a hung chain."
          runbook_url: "https://runbooks.truholdem.com/table-command-timeouts"

      # Commands rejected because the single-writer queue is full = sustained overload; player actions are dropped.
      - alert: TableCommandRejections
        expr: |
          rate(poker_table_command_rejections_total[5m]) > 0
        for: 2m
        labels:
          severity: warning
          service: truholdem
        annotations:
          summary: "Single-writer command rejections (queue full)"
          description: "{{ $value | printf \"%.2f\" }} table commands/s are being rejected (single-writer queue full). The node is overloaded and dropping player actions — scale out or raise queue capacity."
          runbook_url: "https://runbooks.truholdem.com/table-command-rejections"

      # Per-instance: this node is still publishing game events to Redis but receiving none back, so its pub/sub
      # subscription is dead — clients connected to this node stop getting live updates from the rest of the
      # cluster. (Never fires single-node-without-cluster: then nothing is published either.)
      - alert: WsClusterBridgeStalled
        expr: |
          rate(websocket_cluster_events_published_total[5m]) > 0
          and
          rate(websocket_cluster_events_received_total[5m]) == 0
        for: 3m
        labels:
          severity: critical
          service: truholdem
        annotations:
          summary: "WebSocket cluster event bridge stalled on {{ $labels.instance }}"
          description: "This node publishes game events to Redis but receives none back — its pub/sub subscription is broken. Clients on this node are not seeing live updates from other nodes. Check Redis pub/sub and the RedisGameEventBroadcaster subscriber."
          runbook_url: "https://runbooks.truholdem.com/ws-cluster-bridge-stalled"

  # Cluster correctness (Phase 5): cross-node action forwarding, fencing/ownership, and failover takeovers. These
  # signals were previously uninstrumented; without them a multi-node cluster can break multiplayer or thrash
  # ownership with no alert.
  - name: truholdem-cluster
    rules:

      # The owning node is unreachable, so a player's action cannot be forwarded to it. Multiplayer across nodes
      # is broken for the affected tables. (Game-level 4xx rejections from a reachable owner are NOT counted.)
      - alert: ClusterForwardFailures
        expr: |
          rate(truholdem_cluster_forward_failures_total[5m]) > 0
        for: 2m
        labels:
          severity: critical
          service: truholdem
        annotations:
          summary: "Cross-node action forwarding is failing"
          description: "{{ $value | printf \"%.2f\" }} action forwards/s are failing (owner node unreachable). Players on non-owner nodes cannot act on those tables. Check node-to-node connectivity, the node registry, and the owning node's health."
          runbook_url: "https://runbooks.truholdem.com/cluster-forward-failures"

      # Fenced writes rejected because another node holds a newer ownership token — i.e. two nodes briefly both
      # think they own a table. A sustained rate means ownership is thrashing (split-brain risk).
      - alert: ClusterFenceRejections
        expr: |
          rate(truholdem_cluster_fence_rejections_total[5m]) > 0
        for: 3m
        labels:
          severity: critical
          service: truholdem
        annotations:
          summary: "Ownership fencing rejections — possible split-brain"
          description: "{{ $value | printf \"%.2f\" }} fenced writes/s are being rejected because ownership moved to another node. Sustained rejections mean ownership is thrashing — check Redis lease TTL, GC pauses, and clock skew across nodes."
          runbook_url: "https://runbooks.truholdem.com/cluster-fence-rejections"

      # Occasional takeover is normal (a node restart). A burst means nodes are dying/flapping repeatedly.
      - alert: FrequentFailoverTakeovers
        expr: |
          increase(truholdem_cluster_takeovers_total[15m]) > 5
        for: 5m
        labels:
          severity: warning
          service: truholdem
        annotations:
          summary: "Frequent failover takeovers — cluster instability"
          description: "{{ $value | printf \"%.0f\" }} table takeovers in 15m on {{ $labels.instance }}. Nodes are dying or flapping repeatedly — check pod restarts, lease TTL, and node health."
          runbook_url: "https://runbooks.truholdem.com/frequent-failover-takeovers"

      # PostgreSQL mirror is the lagging copy of the Redis-authoritative live state, so a low optimistic-lock
      # conflict rate is expected. A sustained high rate means real write contention — the single-writer or
      # cross-node routing is not serializing writes to a table.
      - alert: HighOptimisticLockConflicts
        expr: |
          rate(truholdem_persist_optimistic_lock_conflicts_total[10m]) > 0.5
        for: 10m
        labels:
          severity: warning
          service: truholdem
        annotations:
          summary: "Elevated optimistic-lock conflicts on game persistence"
          description: "{{ $value | printf \"%.2f\" }} conflicts/s persisting games to PostgreSQL (sustained). Beyond the expected low background rate this points to concurrent writers for one table — check single-writer routing / cluster ownership."
          runbook_url: "https://runbooks.truholdem.com/high-optimistic-lock-conflicts"

  # Async game-persist executor: a backlog means PostgreSQL mirror writes are falling behind the live game. At
  # capacity (512) new persists are rejected and that hand's PG mirror lags until the next boundary write.
  - name: truholdem-persistence
    rules:

      - alert: GamePersistQueueBacklog
        expr: |
          executor_queued_tasks{name="gamePersistExecutor"} > 400
        for: 2m
        labels:
          severity: warning
          service: truholdem
        annotations:
          summary: "Async game-persist queue backing up"
          description: "{{ $value | printf \"%.0f\" }} tasks queued in gamePersistExecutor (capacity 512). PostgreSQL mirror writes are falling behind — check DB write latency / pool saturation before the queue fills and persists are dropped."
          runbook_url: "https://runbooks.truholdem.com/game-persist-queue-backlog"

  # Wallet (real money). Read-only gauges over the money tables. Highest business impact: a dry deposit-address
  # pool blocks new deposits, a backed-up payout pipeline strands withdrawals, and rising failures mean payouts
  # are breaking on-chain.
  - name: truholdem-wallet
    rules:

      # The deposit-address pool for an in-use asset is nearly empty — new users will not get a deposit address.
      # Gated on assigned>0 so it never fires for an asset that was never imported/used.
      - alert: DepositAddressPoolLow
        expr: |
          truholdem_wallet_deposit_pool_free < 20
          and
          truholdem_wallet_deposit_pool_assigned > 0
        for: 5m
        labels:
          severity: warning
          service: truholdem
        annotations:
          summary: "Deposit-address pool low for {{ $labels.asset }}"
          description: "Only {{ $value | printf \"%.0f\" }} free {{ $labels.asset }} deposit addresses remain. Import more before the pool runs dry and new deposits cannot be assigned an address."
          runbook_url: "https://runbooks.truholdem.com/deposit-address-pool-low"

      - alert: DepositAddressPoolCritical
        expr: |
          truholdem_wallet_deposit_pool_free < 5
          and
          truholdem_wallet_deposit_pool_assigned > 0
        for: 1m
        labels:
          severity: critical
          service: truholdem
        annotations:
          summary: "Deposit-address pool nearly empty for {{ $labels.asset }}"
          description: "Only {{ $value | printf \"%.0f\" }} free {{ $labels.asset }} deposit addresses remain — imminent exhaustion. Import addresses now."
          runbook_url: "https://runbooks.truholdem.com/deposit-address-pool-low"

      # Withdrawals piling up in the in-flight pipeline (approval / broadcast). The payout path is stuck.
      - alert: WithdrawalsBacklog
        expr: |
          truholdem_wallet_withdrawals_pending > 50
        for: 30m
        labels:
          severity: warning
          service: truholdem
        annotations:
          summary: "Withdrawal pipeline backing up"
          description: "{{ $value | printf \"%.0f\" }} withdrawals are in flight (awaiting approval/broadcast/confirmation) for 30m+. Check the moderator approval queue and the broadcasting/provider path."
          runbook_url: "https://runbooks.truholdem.com/withdrawals-backlog"

      # Rising count of FAILED withdrawals — payouts are breaking at broadcast / on-chain (each triggers a reversal).
      - alert: WithdrawalFailuresRising
        expr: |
          increase(truholdem_wallet_withdrawals_failed[1h]) > 5
        for: 5m
        labels:
          severity: critical
          service: truholdem
        annotations:
          summary: "Withdrawals are failing"
          description: "{{ $value | printf \"%.0f\" }} withdrawals moved to FAILED in the last hour. Payouts are breaking at broadcast / on-chain — check the wallet provider, gas/fees, and node connectivity."
          runbook_url: "https://runbooks.truholdem.com/withdrawal-failures"

      # Solvency / hot-float coverage. liabilities (Σ of all user balances) + in-flight withdrawals approach the
      # operator-declared on-chain reserve float (app.payments.reserve-float). The wallet balance is an internal
      # custodial IOU ledger, NOT a mirror of on-chain funds, so this is the guard that withdrawals + winnings
      # cannot silently grow past the funds actually custodied. Both rules are gated on reserve_float>0, so they
      # are dormant for any asset whose float the operator has not declared (gauge is NaN → NaN>0 is false).
      - alert: WalletReserveFloatLow
        expr: |
          (
            truholdem_wallet_liabilities + truholdem_wallet_withdrawals_in_flight_amount
          ) / truholdem_wallet_reserve_float > 0.85
          and
          truholdem_wallet_reserve_float > 0
        for: 10m
        labels:
          severity: warning
          service: truholdem
        annotations:
          summary: "Wallet reserve float running low for {{ $labels.asset }}"
          description: "User liabilities + in-flight withdrawals are at {{ $value | printf \"%.0f%%\" }} of the declared on-chain reserve float for {{ $labels.asset }}. Top up the treasury hot/cold float (or raise app.payments.reserve-float if it under-states custodied funds) before withdrawals can exceed available coins."
          runbook_url: "https://runbooks.truholdem.com/wallet-reserve-float"

      - alert: WalletInsolvencyRisk
        expr: |
          (
            truholdem_wallet_liabilities + truholdem_wallet_withdrawals_in_flight_amount
          ) > truholdem_wallet_reserve_float
          and
          truholdem_wallet_reserve_float > 0
        for: 2m
        labels:
          severity: critical
          service: truholdem
        annotations:
          summary: "Wallet liabilities exceed reserve float for {{ $labels.asset }}"
          description: "User liabilities + in-flight withdrawals EXCEED the declared on-chain reserve float for {{ $labels.asset }} — the platform may be unable to honour all withdrawals. Freeze/throttle payouts, reconcile the treasury balance against this figure, and top up custodied funds."
          runbook_url: "https://runbooks.truholdem.com/wallet-reserve-float"

# Alertmanager: routes the alerts Prometheus fires (docker/prometheus/alerts.yml) to receivers, with
# grouping, deduplication, severity routing, and inhibition. The webhook URLs below are PLACEHOLDERS — point
# them at your real sinks (Slack / PagerDuty / Opsgenie / e-mail). Validate with:
#   docker run --rm -v "$PWD/monitoring:/cfg" --entrypoint amtool prom/alertmanager:latest check-config /cfg/alertmanager.yml

global:
  resolve_timeout: 5m
  # Uncomment + set to send e-mail (or use slack_configs / pagerduty_configs in the receivers below):
  # smtp_smarthost: 'smtp.example.com:587'
  # smtp_from: 'alerts@truholdem.example'
  # smtp_auth_username: 'alerts@truholdem.example'
  # smtp_auth_password: '...'

route:
  receiver: default
  # One notification per (alert, service) group instead of a message per firing series.
  group_by: ['alertname', 'service']
  group_wait: 30s         # wait to bundle alerts that fire close together
  group_interval: 5m      # how often to send updates for a group with new alerts
  repeat_interval: 4h     # re-notify an unresolved group at most this often (no spam)
  routes:
    # Page-worthy: critical + page severities go to the on-call/pager receiver.
    - matchers:
        - severity = "critical"
      receiver: critical
    - matchers:
        - severity = "page"
      receiver: critical
    # Everything else (warning) goes to the team chat receiver.
    - matchers:
        - severity = "warning"
      receiver: warning

inhibit_rules:
  # Redis is down → suppress the alerts that are merely symptoms of it (hot-state, fencing, WS bridge, forwarding),
  # so the on-call gets one "CacheDown" page, not a storm. Matched within the same service.
  - source_matchers:
      - alertname = "CacheDown"
    target_matchers:
      - alertname =~ "HotStateWriteFailures|HotStateDisabledButEnabled|WsClusterBridgeStalled|ClusterFenceRejections|ClusterForwardFailures"
    equal: ['service']

  # A critical for an alert suppresses the warning-level version of the same alert (same alertname + service).
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ['alertname', 'service']

  # Critical deposit-pool exhaustion for an asset suppresses the low-pool warning for that same asset.
  - source_matchers:
      - alertname = "DepositAddressPoolCritical"
    target_matchers:
      - alertname = "DepositAddressPoolLow"
    equal: ['asset']

receivers:
  # Default sink. Replace the webhook URL (or swap for slack_configs / email_configs).
  - name: default
    webhook_configs:
      - url: 'http://alert-sink:9000/default'
        send_resolved: true

  # Page-worthy. Wire this to PagerDuty / Opsgenie / a high-urgency Slack channel.
  - name: critical
    webhook_configs:
      - url: 'http://alert-sink:9000/critical'
        send_resolved: true
    # Example Slack (uncomment + set api_url to your incoming-webhook URL):
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/XXXXX'
    #     channel: '#truholdem-pages'
    #     send_resolved: true
    #     title: '{{ .CommonAnnotations.summary }}'
    #     text: '{{ range .Alerts }}{{ .Annotations.description }}\n{{ end }}'
    # Example PagerDuty (uncomment + set routing_key):
    # pagerduty_configs:
    #   - routing_key: '<integration-key>'
    #     severity: 'critical'

  # Team chat for warnings.
  - name: warning
    webhook_configs:
      - url: 'http://alert-sink:9000/warning'
        send_resolved: true
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/XXXXX'
    #     channel: '#truholdem-alerts'
    #     send_resolved: true

global:
  scrape_interval: 15s
  evaluation_interval: 15s

  external_labels:
    monitor: 'truholdem-monitor'


rule_files:
  - /etc/prometheus/alerts.yml

# Send fired alerts to Alertmanager (routing / grouping / inhibition / notifications). Without this, rules fire
# in Prometheus but notify nobody.
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']





scrape_configs:
  
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  
  - job_name: 'truholdem-backend'
    metrics_path: '/api/actuator/prometheus'
    static_configs:
      - targets: ['backend:8080']
    scrape_interval: 10s

  
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']
    scrape_interval: 10s

  
  - job_name: 'otel-metrics'
    static_configs:
      - targets: ['otel-collector:8889']
    scrape_interval: 10s

  
  - job_name: 'jaeger'
    static_configs:
      - targets: ['jaeger:14269']
    scrape_interval: 15s

  
  # Scrape the redis_exporter (HTTP /metrics on 9121), NOT the Redis RESP port 6379. The exporter exposes
  # redis_up (1 when it can reach Redis) plus memory/clients/keyspace metrics.
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 15s

apiVersion: v1
kind: ConfigMap
metadata:
  name: truholdem-backend-config
  namespace: truholdem-pyramid
data:
  SPRING_PROFILES_ACTIVE: "pyramid-prod"
  REDIS_HOST: "truholdem-redis"
  REDIS_PORT: "6379"
  WEBSOCKET_CLUSTER_ENABLED: "true"
  APP_GAME_HOT_STATE_ENABLED: "true"
  APP_GAME_PERSIST_ON_HAND_END_ONLY: "true"
  APP_TOURNAMENT_MAX_PLAYERS_LIMIT: "10000"
  APP_TOURNAMENT_ASYNC_START_THRESHOLD: "500"
  APP_TOURNAMENT_SHARD_COUNT: "16"
  APP_TOURNAMENT_PYRAMID_DEFAULT_SEATS_PER_TABLE: "10"
  APP_TOURNAMENT_PYRAMID_DEFAULT_HANDS_PER_ROUND: "5"
  APP_TOURNAMENT_PYRAMID_TABLE_PARALLELISM: "32"
  APP_TOURNAMENT_DETAIL_MAX_REGISTRATIONS: "100"
  JAVA_TOOL_OPTIONS: "-Xms4g -Xmx12g -XX:+UseG1GC -XX:MaxGCPauseMillis=200"

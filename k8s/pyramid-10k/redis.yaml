apiVersion: apps/v1
kind: Deployment
metadata:
  name: truholdem-redis
  namespace: truholdem-pyramid
spec:
  replicas: 1
  selector:
    matchLabels:
      app: truholdem-redis
  template:
    metadata:
      labels:
        app: truholdem-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args:
            - redis-server
            - --maxmemory
            - 2gb
            - --maxmemory-policy
            - allkeys-lru
            - --appendonly
            - "yes"
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: 2Gi
              cpu: "500m"
            limits:
              memory: 4Gi
              cpu: "2"
---
apiVersion: v1
kind: Service
metadata:
  name: truholdem-redis
  namespace: truholdem-pyramid
spec:
  selector:
    app: truholdem-redis
  ports:
    - port: 6379
      targetPort: 6379
